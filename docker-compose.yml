version: "3.9"

services:
  study4u:

    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: study4u-container

    expose:
      - "5000"

    restart: unless-stopped

  nginx:
    image: nginx:latest

    container_name: nginx-container

    ports:
      - "80:80"
      
    volumes:
      - ./nginx/nginx.conf:/etc/nginx//nginx.conf:ro
      
    depends_on:
      - study4u

    restart: unless-stopped
        


